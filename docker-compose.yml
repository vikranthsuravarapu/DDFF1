services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your_secure_jwt_secret_here
      - GOOGLE_CLIENT_ID=your_google_client_id
      - GOOGLE_CLIENT_SECRET=your_google_client_secret
      - APP_URL=http://localhost:3000
    volumes:
      - ./grama_ruchulu.db:/app/grama_ruchulu.db
    restart: always
